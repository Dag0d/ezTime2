name: Publish Timezoned Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "server/**"
      - ".github/workflows/publish-timezoned.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions
        id: versions
        run: |
          APP_VERSION="$(tr -d '[:space:]' < server/VERSION)"
          TZDATA_VERSION="$(curl -fsSL https://data.iana.org/time-zones/tzdb/version)"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tzdata_version=${TZDATA_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/timezoned
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.versions.outputs.app_version }}-${{ steps.versions.outputs.tzdata_version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.versions.outputs.tzdata_version }}
            APP_VERSION=${{ steps.versions.outputs.app_version }}
